      .scrollbar-hide::-webkit-scrollbar { display: none; }

        border-bottom-color: #e72a18;
        animation: spin-slow 4s linear infinite;

        opacity: 0.4;
      }
      .profile-3d-ring-inner {
        position: absolute;
        inset: -8px;
        border-radius: 50%;
        border: 1px dashed rgba(231, 42, 24, 0.3);
        animation: spin-slow 8s linear infinite reverse;
        pointer-events: none;
      }
      .profile-scanner {
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, transparent, rgba(231, 42, 24, 0.2), transparent);
        height: 20%;
        width: 100%;
        top: -20%;
        animation: scan 3s linear infinite;
        pointer-events: none;
        z-index: 20;
      }
      @keyframes scan {
        0% { top: -20%; opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { top: 100%; opacity: 0; }
      }
      .tech-corner {
        position: absolute;
        width: 12px;
        height: 12px;
        border-color: #e72a18;
        opacity: 0.6;
        z-index: 25;
      }
      .tech-corner-tl { top: -5px; left: -5px; border-top-width: 2px; border-left-width: 2px; }
      .tech-corner-tr { top: -5px; right: -5px; border-top-width: 2px; border-right-width: 2px; }
